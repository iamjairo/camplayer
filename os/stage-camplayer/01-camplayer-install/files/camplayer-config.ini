# Camplayer configuration
# Edit this file on any PC by inserting the SD card
# Full documentation: https://github.com/raspicamplayer/camplayer

[DEVICE1]
channel1_name = Camera 1
channel1.1_url = rtsp://admin:password@192.168.1.100/stream1
channel1.2_url = rtsp://admin:password@192.168.1.100/stream2

[SCREEN1]
layout = 1
window1 = device1,channel1

[ADVANCED]
stream_quality = 1
changeover_type = 1
background = 1
hevc_mode = 1
audio_mode = 0
screen_changeover_time = 0
